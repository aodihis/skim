name: Large-file integration test

# Triggered manually only. Point it at any raw SQL dump URL from your fixtures repo.
on:
  workflow_dispatch:
    inputs:
      sql_url:
        description: "Direct download URL of the SQL dump file (raw GitHub URL, S3, etc.)"
        required: true
        default: "https://raw.githubusercontent.com/aodihis/large-sql-test/main/fixture.sql"
        type: string
      table_filter:
        description: "Table name to pass with -t (leave blank to convert all tables)"
        required: false
        default: ""
        type: string
      rss_limit_mb:
        description: "Fail if peak RSS (MiB) exceeds this value"
        required: false
        default: "200"
        type: string

jobs:
  integration:
    name: Stream + profile
    runs-on: ubuntu-latest

    steps:
      # ── Build ────────────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release

      # ── Fetch fixture ────────────────────────────────────────────────────────
      - name: Download SQL dump
        run: |
          curl -fsSL "${{ inputs.sql_url }}" -o fixture.sql
          echo "fixture size: $(du -sh fixture.sql | cut -f1)"
          wc -l fixture.sql

      # ── Helper: build the -t flag if a filter was supplied ───────────────────
      - name: Resolve table filter flag
        id: tfilter
        run: |
          if [ -n "${{ inputs.table_filter }}" ]; then
            echo "flag=-t ${{ inputs.table_filter }}" >> "$GITHUB_OUTPUT"
          else
            echo "flag=" >> "$GITHUB_OUTPUT"
          fi

      # ── Format runs with peak-RSS capture ───────────────────────────────────
      # --no-progress suppresses the progress bar so ANSI codes don't appear in CI logs.
      - name: Convert → JSONL  (memory profiled)
        id: run_jsonl
        run: |
          /usr/bin/time -v \
            ./target/release/skim --no-progress fixture.sql -f jsonl ${{ steps.tfilter.outputs.flag }} -o out.jsonl \
            2> time_jsonl.txt
          cat time_jsonl.txt
          ROW_COUNT=$(wc -l < out.jsonl)
          echo "rows=$ROW_COUNT" >> "$GITHUB_OUTPUT"
          echo "JSONL rows: $ROW_COUNT"

      - name: Convert → JSON
        run: |
          ./target/release/skim --no-progress fixture.sql -f json ${{ steps.tfilter.outputs.flag }} -o out.json
          echo "JSON file size: $(du -sh out.json | cut -f1)"

      - name: Convert → CSV
        run: |
          ./target/release/skim --no-progress fixture.sql -f csv ${{ steps.tfilter.outputs.flag }} -o out.csv
          echo "CSV file size: $(du -sh out.csv | cut -f1)"

      - name: Convert → YAML
        run: |
          ./target/release/skim --no-progress fixture.sql -f yaml ${{ steps.tfilter.outputs.flag }} -o out.yaml
          echo "YAML file size: $(du -sh out.yaml | cut -f1)"

      - name: Convert → TOML
        run: |
          ./target/release/skim --no-progress fixture.sql -f toml ${{ steps.tfilter.outputs.flag }} -o out.toml
          echo "TOML file size: $(du -sh out.toml | cut -f1)"

      - name: Convert → Parquet
        run: |
          /usr/bin/time -v \
            ./target/release/skim --no-progress fixture.sql -o out.parquet ${{ steps.tfilter.outputs.flag }} \
            2> time_parquet.txt
          cat time_parquet.txt
          echo "Parquet file size: $(du -sh out.parquet | cut -f1)"

      # ── Install Python validation deps (once, before all validators) ───────────
      - name: Install Python validation deps
        run: pip install pyyaml pyarrow --quiet

      # ── Structural validation — each format checked independently ────────────
      - name: Validate JSONL structure
        run: |
          python3 - <<'EOF'
          import sys, json

          errors = 0
          lines_checked = 0
          with open("out.jsonl") as f:
              for i, raw in enumerate(f, 1):
                  line = raw.strip()
                  if not line:
                      continue
                  try:
                      obj = json.loads(line)
                  except json.JSONDecodeError as e:
                      print(f"JSONL ERROR line {i}: {e}")
                      errors += 1
                      if errors >= 10:
                          print("Too many errors, stopping early.")
                          break
                      continue
                  if not isinstance(obj, dict):
                      print(f"JSONL ERROR line {i}: expected object, got {type(obj).__name__}")
                      errors += 1
                  lines_checked += 1

          if errors:
              sys.exit(1)
          print(f"JSONL OK — {lines_checked} objects, all valid")
          EOF

      - name: Validate JSON structure
        run: |
          python3 - <<'EOF'
          import sys, json

          with open("out.json") as f:
              try:
                  data = json.load(f)
              except json.JSONDecodeError as e:
                  print(f"JSON ERROR: {e}")
                  sys.exit(1)

          # JSON output is grouped by table: {"table_name": [...rows...], ...}
          if not isinstance(data, dict):
              print(f"JSON ERROR: top-level value is {type(data).__name__}, expected object grouped by table")
              sys.exit(1)

          errors = 0
          total_rows = 0
          for table, rows in data.items():
              if not isinstance(rows, list):
                  print(f"JSON ERROR: key {table!r} has value of type {type(rows).__name__}, expected array")
                  errors += 1
                  continue
              non_objects = [i for i, v in enumerate(rows) if not isinstance(v, dict)]
              if non_objects:
                  print(f"JSON ERROR: {table!r} has {len(non_objects)} non-object entries (first at index {non_objects[0]})")
                  errors += 1
              total_rows += len(rows)

          if errors:
              sys.exit(1)
          print(f"JSON OK — {len(data)} table(s), {total_rows} total rows")
          EOF

      - name: Validate CSV structure
        run: |
          python3 - <<'EOF'
          import sys, csv, io

          # CSV output supports multiple tables separated by blank lines.
          # Each section has its own header; column counts are consistent within a section.
          with open("out.csv", newline="") as f:
              content = f.read()

          sections = [s.strip() for s in content.split("\n\n") if s.strip()]
          if not sections:
              print("CSV ERROR: file is empty")
              sys.exit(1)

          errors = 0
          total_rows = 0
          for sec_idx, section in enumerate(sections, 1):
              reader = csv.reader(io.StringIO(section))
              header = next(reader, None)
              if header is None or not header:
                  print(f"CSV ERROR section {sec_idx}: missing or empty header row")
                  errors += 1
                  continue
              col_count = len(header)
              row_count = 0
              for i, row in enumerate(reader, 2):
                  row_count += 1
                  if len(row) != col_count:
                      print(f"CSV ERROR section {sec_idx} row {i}: expected {col_count} columns, got {len(row)}")
                      errors += 1
                      if errors >= 10:
                          print("Too many errors, stopping early.")
                          break
              total_rows += row_count
              print(f"  Section {sec_idx}: {col_count} columns, {row_count} data rows (header: {header[:3]}{'...' if len(header) > 3 else ''})")

          if errors:
              sys.exit(1)
          print(f"CSV OK — {len(sections)} section(s), {total_rows} total data rows")
          EOF

      - name: Validate YAML structure
        run: |
          python3 - <<'EOF'
          import sys, yaml

          errors = 0
          doc_count = 0
          with open("out.yaml") as f:
              for doc in yaml.safe_load_all(f):
                  doc_count += 1
                  if doc is not None and not isinstance(doc, dict):
                      print(f"YAML ERROR doc {doc_count}: expected mapping, got {type(doc).__name__}")
                      errors += 1
                      if errors >= 10:
                          break

          if errors:
              sys.exit(1)
          print(f"YAML OK — {doc_count} documents, all valid mappings")
          EOF

      - name: Validate TOML structure
        run: |
          python3 - <<'EOF'
          import sys, tomllib

          with open("out.toml", "rb") as f:
              try:
                  data = tomllib.load(f)
              except tomllib.TOMLDecodeError as e:
                  print(f"TOML ERROR: {e}")
                  sys.exit(1)

          if not data:
              print("TOML OK — empty file")
              sys.exit(0)

          errors = 0
          total_rows = 0
          for key, value in data.items():
              if not isinstance(value, list):
                  print(f"TOML ERROR: key [{key!r}] is {type(value).__name__}, expected array of tables")
                  errors += 1
                  continue
              for i, entry in enumerate(value):
                  if not isinstance(entry, dict):
                      print(f"TOML ERROR: [[{key}]] entry {i} is {type(entry).__name__}, expected table")
                      errors += 1
                      if errors >= 10:
                          break
              total_rows += len(value)

          if errors:
              sys.exit(1)
          print(f"TOML OK — {total_rows} table entries across {len(data)} key(s)")
          EOF

      - name: Validate Parquet structure
        run: |
          python3 - <<'EOF'
          import sys
          import pyarrow.parquet as pq

          try:
              meta = pq.read_metadata("out.parquet")
          except Exception as e:
              print(f"Parquet ERROR reading metadata: {e}")
              sys.exit(1)

          try:
              schema = pq.read_schema("out.parquet")
          except Exception as e:
              print(f"Parquet ERROR reading schema: {e}")
              sys.exit(1)

          if len(schema) == 0:
              print("Parquet ERROR: schema has 0 columns")
              sys.exit(1)

          # Read the first row group to verify data pages are not corrupt.
          try:
              first_batch = pq.read_table("out.parquet").slice(0, 1)
          except Exception as e:
              print(f"Parquet ERROR reading first row: {e}")
              sys.exit(1)

          print(f"Parquet OK — {meta.num_rows} rows, {len(schema)} columns")
          print(f"  Schema: {', '.join(f.name for f in schema)}")
          EOF

      # ── Stdin streaming smoke-test ───────────────────────────────────────────
      - name: Stdin pipe smoke-test
        run: |
          ROW_COUNT=$(cat fixture.sql \
            | ./target/release/skim --no-progress -f jsonl ${{ steps.tfilter.outputs.flag }} \
            | wc -l)
          echo "Stdin JSONL rows: $ROW_COUNT"
          EXPECTED=${{ steps.run_jsonl.outputs.rows }}
          if [ "$ROW_COUNT" != "$EXPECTED" ]; then
            echo "ERROR: stdin row count ($ROW_COUNT) != file row count ($EXPECTED)"
            exit 1
          fi

      # ── RSS assertion ────────────────────────────────────────────────────────
      - name: Assert peak RSS is within limit
        run: |
          LIMIT_MB=${{ inputs.rss_limit_mb }}

          extract_rss_mb() {
            # /usr/bin/time -v emits "Maximum resident set size (kbytes): NNNN"
            grep "Maximum resident set size" "$1" \
              | awk '{print $NF}' \
              | awk '{printf "%d", $1 / 1024}'
          }

          JSONL_MB=$(extract_rss_mb time_jsonl.txt)
          PARQUET_MB=$(extract_rss_mb time_parquet.txt)

          echo "Peak RSS — JSONL: ${JSONL_MB} MiB, Parquet: ${PARQUET_MB} MiB  (limit: ${LIMIT_MB} MiB)"

          FAILED=0
          if [ "$JSONL_MB" -gt "$LIMIT_MB" ]; then
            echo "FAIL: JSONL peak RSS ${JSONL_MB} MiB exceeds limit ${LIMIT_MB} MiB"
            FAILED=1
          fi
          if [ "$PARQUET_MB" -gt "$LIMIT_MB" ]; then
            echo "FAIL: Parquet peak RSS ${PARQUET_MB} MiB exceeds limit ${LIMIT_MB} MiB"
            FAILED=1
          fi

          exit $FAILED

      # ── Upload outputs as artifacts for manual inspection ────────────────────
      - name: Upload converted outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: converted-outputs
          path: |
            out.jsonl
            out.json
            out.csv
            out.yaml
            out.toml
            out.parquet
            time_jsonl.txt
            time_parquet.txt
          retention-days: 3
