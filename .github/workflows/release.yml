name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: skim
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: skim
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: skim
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: skim.exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          mkdir dist
          ext=""
          [[ "${{ matrix.os }}" == "windows-latest" ]] && ext=".exe"
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} \
             dist/skim-${{ matrix.target }}${ext}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
