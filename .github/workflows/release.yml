name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  version-check:
    name: Version matches tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify Cargo.toml version matches release tag
        run: |
          cargo_version=$(grep '^version' Cargo.toml | head -1 | sed 's/.*= *"\(.*\)"/\1/')
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$cargo_version" != "$tag_version" ]; then
            echo "::error file=Cargo.toml::Cargo.toml version ($cargo_version) does not match release tag ($GITHUB_REF_NAME). Bump the version before releasing."
            exit 1
          fi
          echo "Version check passed: $cargo_version == $tag_version"

  build:
    needs: version-check
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: skim
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: skim
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: skim
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: skim.exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          mkdir dist
          ext=""
          [[ "${{ matrix.os }}" == "windows-latest" ]] && ext=".exe"
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} \
             dist/skim-${{ matrix.target }}${ext}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
